<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro de turnos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="6" width="36" height="30" rx="3" stroke="currentColor" stroke-width="2"/>
      <line x1="2" y1="14" x2="38" y2="14" stroke="currentColor" stroke-width="2"/>
      <line x1="11" y1="2" x2="11" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="29" y1="2" x2="29" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="20" cy="24" r="4.5" stroke="currentColor" stroke-width="2"/>
      <line x1="20" y1="24" x2="20" y2="21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="20" y1="24" x2="22" y2="25.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <div>
      <h1>Libro de turnos</h1>
      <p class="brand-sub">Registro diario de pacientes</p>
    </div>
  </div>
</header>

<section class="stats" id="stats" aria-label="Resumen del día">
  <div class="stat-card">
    <span class="stat-num" id="stat-hoy">0</span>
    <span class="stat-label">Turnos hoy</span>
  </div>
  <div class="stat-card">
    <span class="stat-num" id="stat-pendientes">0</span>
    <span class="stat-label">Pendientes hoy</span>
  </div>
  <div class="stat-card">
    <span class="stat-num" id="stat-atendidos">0</span>
    <span class="stat-label">Atendidos hoy</span>
  </div>
  <div class="stat-card">
    <span class="stat-num" id="stat-total">0</span>
    <span class="stat-label">Total en la agenda</span>
  </div>
</section>

<main class="layout">

  <section class="panel form-panel" aria-labelledby="form-title">
    <div class="form-panel-header">
      <h2 id="form-title">Nuevo turno</h2>
      <span class="edit-flag" id="edit-flag" hidden>Editando turno</span>
    </div>

    <form id="form-turno" novalidate>

      <div class="field-row">
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" autocomplete="off" required>
          <span class="field-hint" data-hint-for="nombre"></span>
        </div>
        <div class="field">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" autocomplete="off" required>
          <span class="field-hint" data-hint-for="apellido"></span>
        </div>
      </div>

      <div class="field">
        <label for="dni">DNI</label>
        <input type="text" id="dni" name="dni" inputmode="numeric" placeholder="Sin puntos, ej: 30456789" required>
        <span class="field-hint" data-hint-for="dni"></span>
      </div>

      <div class="field">
        <label for="obraSocial">Obra social</label>
        <input list="obras-sociales" id="obraSocial" name="obraSocial" autocomplete="off" placeholder="Escribí o elegí una opción" required>
        <datalist id="obras-sociales">
          <option value="OSDE">
          <option value="SWISS MEDICAL">
          <option value="NOVIS">
          <option value="IPS">
          <option value="IOMA">
          <option value="PAMI">
          <option value="PIEVE SALUD">
          <option value="OSECAC">
          <option value="SANCOR SALUD">
          <option value="PREVENCION SALUD">
          <option value="Particular / Sin cobertura">
        </datalist>
        <span class="field-hint" data-hint-for="obraSocial"></span>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="fecha">Fecha</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>
        <div class="field">
          <label for="hora">Hora</label>
          <input type="time" id="hora" name="hora" required>
        </div>
      </div>
      <button type="button" class="btn-link" id="btn-hoy">Usar fecha y hora de ahora</button>

      <div class="field">
        <label for="motivo">Motivo <span class="opcional">(opcional)</span></label>
        <input type="text" id="motivo" name="motivo" autocomplete="off" placeholder="Ej: control, primera consulta">
      </div>

      <p class="form-error" id="form-error" hidden></p>

      <div class="form-actions">
        <button type="submit" class="btn-primary" id="btn-submit">Agregar turno</button>
        <button type="button" class="btn-secondary" id="btn-cancelar-edicion" hidden>Cancelar</button>
      </div>
    </form>
  </section>

  <section class="panel list-panel" aria-labelledby="list-title">
    <div class="list-header">
      <h2 id="list-title">Agenda</h2>
      <div class="list-controls">
        <input type="search" id="buscador" placeholder="Buscar por apellido o DNI…" aria-label="Buscar turno">
        <select id="filtro-estado" aria-label="Filtrar por estado">
          <option value="todos">Todos</option>
          <option value="pendiente">Solo pendientes</option>
          <option value="atendido">Solo atendidos</option>
        </select>
      </div>
    </div>
    <div id="ledger" class="ledger">
      <p class="empty-state">Cargando turnos…</p>
    </div>
  </section>

</main>

<div class="toast-stack" id="toast-stack" aria-live="polite"></div>

<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" role="alertdialog" aria-labelledby="modal-title" aria-describedby="modal-desc">
    <h3 id="modal-title">Eliminar turno</h3>
    <p id="modal-desc"></p>
    <div class="modal-actions">
      <button type="button" class="btn-secondary" id="modal-cancelar">Cancelar</button>
      <button type="button" class="btn-danger" id="modal-confirmar">Eliminar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
